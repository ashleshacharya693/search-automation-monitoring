name: Search Monitoring

on:
  schedule:
    - cron: '30 20 * * *'   # 2:00 AM IST daily
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: poetry install

      - name: Setup VPN
        run: |
          sudo apt-get install -y openvpn
          echo "${{ secrets.VPN_CONFIG }}" > vpn-config.ovpn
          sudo openvpn --config vpn-config.ovpn --daemon
          sleep 10

      - name: Run Premium Tests
        run: poetry run pytest scenarios/test_premium.py -v --tb=short
        continue-on-error: true

      - name: Run Live Match Tests
        run: poetry run pytest scenarios/test_live_match.py -v --tb=short
        continue-on-error: true

      - name: Run Offboarded Tests
        run: poetry run pytest scenarios/test_offboarded.py -v --tb=short
        continue-on-error: true

      - name: Run Fuzzy & Synonym Tests
        run: poetry run pytest scenarios/test_fuzzy_synonym.py -v --tb=short
        continue-on-error: true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: search-monitoring-reports-${{ github.run_number }}
          path: reports/*.xlsx
          retention-days: 30