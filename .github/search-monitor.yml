name: Search Monitoring

on:
  schedule:
    - cron: '30 20 * * *'   # 2:00 AM IST
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: poetry install

      - name: Run Premium Monitoring
        run: poetry run pytest -m premium

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: premium-report
          path: reports/*.xlsx